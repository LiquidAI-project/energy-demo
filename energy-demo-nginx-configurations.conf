# subdomain server for the LiquidAI project and the energy demo orchestrator application
server
{
    listen 443 ssl http2;
    server_name <ORCHESTRATOR_DOMAIN_NAME>;

    ssl_certificate /run/secrets/<CERTIFICATE_SECRET_NAME>;
    ssl_certificate_key /run/secrets/<CERTIFICATE_PRIVATE_KEY_SECRET_NAME>;
    ssl_session_timeout 20m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA:ECDHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA;
    ssl_session_cache shared:SSL:50m;
    ssl_dhparam /run/secrets/dhparams;
    ssl_prefer_server_ciphers on;

    root /;

    location = /favicon.ico
    {
        root /etc/nginx/html;
        try_files /favicon.ico =404;
    }

    location /websocket/ {
        # internal location only can access by rewrite, if client open /websocket/ will return 404
        internal;

        # must end with "/", see https://steelywing.github.io/note/Note/Nginx/Proxy/
        proxy_pass http://host.docker.internal:<WEBSOCKET_PORT>/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        set $websocket 1;
        if ($http_connection !~* "upgrade") {
            set $websocket 0;
        }
        if ($http_upgrade !~* "websocket") {
            set $websocket 0;
        }
        if ($websocket) {
            rewrite ^ /websocket$uri last;
        }

        auth_basic $orchestrator_authentication;
        auth_basic_user_file /run/secrets/<ORCHESTRATOR_PASS_FILE_SECRET_NAME>;

        proxy_no_cache $http_host;
        proxy_pass http://host.docker.internal:<ORCHESTRATOR_PORT>/;
    }
}

