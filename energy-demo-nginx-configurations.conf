# this is the relevant part of the Nginx configuration for the LiquidAI energy demo
# all this go should go inside http element
# i.e., the full Nginx configuration would be (with ...s expanded to appropriate other configurations)
#
# ...
# http {
#     ...
#     # everything from here after ===== line
#     ...
# }
# ...

# ==============================================

geo $orchestrator_authentication
{
    default         "Authentication required";
    130.230.52.191  "off";
}

# subdomain server for the LiquidAI project and the energy demo frontend + Mongo Express
server
{
    listen 443 ssl http2;
    server_name energy.tlt-cityiot.rd.tuni.fi;

    ssl_certificate /run/secrets/certificate_evc;
    ssl_certificate_key /run/secrets/private_key_evc;
    ssl_session_timeout 20m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA:ECDHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA;
    ssl_session_cache shared:SSL:50m;
    ssl_dhparam /run/secrets/dhparams;
    ssl_prefer_server_ciphers on;

    root /;

    location = /favicon.ico
    {
        root /etc/nginx/html;
        try_files /favicon.ico =404;
    }

    location /websocket/ {
        # internal location only can access by rewrite, if client open /websocket/ will return 404
        internal;

        # must end with "/", see https://steelywing.github.io/note/Note/Nginx/Proxy/
        proxy_pass http://host.docker.internal:5991/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /draft
    {
        proxy_no_cache $http_host;
        rewrite ^/draft(.*) $scheme://energy-dev.tlt-cityiot.rd.tuni.fi$1 permanent;
    }

    # Mongo Express (has its own basic authentication)
    location /express/
    {
        proxy_no_cache $http_host;
        proxy_pass http://host.docker.internal:5983/express/;
    }

    # frontend for the demo
    location /
    {
        set $websocket 1;
        if ($http_connection !~* "upgrade") {
            set $websocket 0;
        }
        if ($http_upgrade !~* "websocket") {
            set $websocket 0;
        }
        if ($websocket) {
            rewrite ^ /websocket$uri last;
        }

        proxy_no_cache $http_host;
        proxy_pass http://host.docker.internal:5982/;
    }
}

