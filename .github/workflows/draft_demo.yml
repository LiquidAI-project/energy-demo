name: Deploy draft version of the energy demo

on:
  workflow_dispatch:
  push:
    branches:
      - "draft"

env:
  IMAGE_CONTEXT: run-demo/frontend
  IMAGE_FILENAME: Dockerfile
  IMAGE_NAME: frontend
  IMAGE_TAG: draft
  PLATFORMS: linux/amd64
  REGISTRY: ghcr.io

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Store full image name
        id: repo_lowercase
        run: |
          export REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "FULL_IMAGE_NAME=${{ env.REGISTRY }}/${REPO_NAME}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Log into container registry
        uses: docker/login-action@v2
        with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get container meta information
        id: meta
        uses: docker/metadata-action@v5
        with:
            images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image for energy demo frontend
        uses: docker/build-push-action@v4
        with:
            context: ${{ env.IMAGE_CONTEXT }}
            file: ${{ env.IMAGE_CONTEXT }}/${{ env.IMAGE_FILENAME }}
            tags: ${{ env.FULL_IMAGE_NAME }}
            platforms: ${{ env.PLATFORMS }}
            push: ${{ github.event_name != 'pull_request' }}
            labels: ${{ steps.meta.labels }}
